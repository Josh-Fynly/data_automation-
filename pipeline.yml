name: Data Automation Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Ensure data folders exist
      - name: Prepare directories
        run: |
          mkdir -p data/raw
          mkdir -p data/processed

      # 5. Create sample input (CRITICAL for GitHub runner)
      - name: Create sample CSV
        run: |
          echo "Name,Sales,Profit" > data/raw/input.csv
          echo "A,100,20" >> data/raw/input.csv
          echo "B,200," >> data/raw/input.csv
          echo "A,100,20" >> data/raw/input.csv
          echo "C,300,50" >> data/raw/input.csv

      # 6. Run your pipeline
      - name: Run data pipeline
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python main.py

      # 7. Upload proof (VERY IMPORTANT)
      - name: Upload report artifact
        uses: actions/upload-artifact@v3
        with:
          name: processed-report
          path: data/processed/report.json
